theme: jekyll-text-theme

text_skin: dark
highlight_theme: tomorrow-night

url: https://mrblahhhh.github.io
baseurl:

title: Garage & Code
description: >
  Automotive tuning, embedded telemetry, and custom fabrication.

lang: en
timezone: America/New_York

author:
  type: person
  name: mrblahhhh
  url: https://github.com/mrblahhhh
  avatar: https://github.com/mrblahhhh.png
  bio: Track builds, CAN bus hacks, and custom fabrication.
  github: mrblahhhh

repository: mrblahhhh/mrblahhhh.github.io
repository_tree: main

paths:
  root: /
  home: /
  archive: /archive.html
  rss: /feed.xml

excerpt_separator: <!--more-->

license: CC-BY-4.0

toc:
  selectors: h2,h3

paginate: 8
paginate_path: /page:num

sharing:
  provider: false

comments:
  provider: false

pageview:
  provider: false

search:
  provider: default

analytics:
  provider: false

markdown: kramdown
highlighter: rouge
permalink: date

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: true
      license: true
      aside:
        toc: true
        show_edit_on_github: true
        show_subscribe: true
      pageview: false

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
